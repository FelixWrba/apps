<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometrie Spiel</title>
    <style>
        #game-canvas {
            background-color: black;
        }

        #pause-btn {
            position: absolute;
            top: 12px;
            right: 12px;
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: black;
            color: white;
        }

        .overlay {
            position: absolute;
            top: 0;
            width: 100vw;
            height: 100vh;
        }

        .center {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        #pause-menu {
            visibility: hidden;
        }
    </style>
</head>

<body>
    <canvas id="game-canvas"></canvas>
    <button id="pause-btn">Anhalten</button>

    <div id="main-menu" class="overlay center">
        <h1>Geometrie Dash</h1>
        <button id="start-button">Starten</button>
        <a href="/">Zurück</a>
    </div>

    <div id="pause-menu" class="overlay center">
        <h2>Spiel angehalten</h2>
        <button id="continue-button">Fortsetzen</button>
        <button id="exit-button">Hauptmenü</button>
    </div>

    <script src="../lib.js"></script>
    <script src="game.js"></script>
</body>

</html>
