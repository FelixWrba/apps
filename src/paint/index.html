<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paint</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="/main.css">
    <meta name="description" content="TODO: Insert description">
</head>

<body>
    <header>
        <a href="/" aria-label="Home" title="Home">&larr;</a>
        <h1>Paint</h1>
    </header>

    <main id="app">
        <div class="menu">
            <div class="mode-menu">
                <button id="move-mode-button" class="select">Move</button>
                <button id="draw-mode-button">Draw</button>
            </div>
            <div class="action-menu">
                <button>Undo</button>
                <button disabled>Redo</button>
            </div>
            <div class="options-menu">
                <label for="fill-color-input">Fill: </label>
                <input type="color" id="fill-color-input">
                <label for="stroke-color-input">Stroke: </label>
                <input type="color" id="stroke-color-input">
            </div>
        </div>
        <canvas id="canvas"></canvas>
        <p id="debug">Debug info</p>
    </main>

    <footer>
        Copyright &copy; 2026 Felix Wrba. Alle Rechte vorbehalten.
    </footer>

    <script src="../lib.js"></script>
    <script src="main.js"></script>
</body>

</html>
