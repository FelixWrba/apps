<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zufallsgenerator</title>
    <meta name="description"
        content="Dieser Zufallsgenerator erstellt in Sekundenschnelle zufällige Zahlen aus einem Bereich, simuliert einen Würfel oder eine Münze.">
    <link rel="stylesheet" href="../main.css">
    <style>
        .output-line {
            margin: 1rem;
        }

        .random-output {
            font-family: 'Courier New', Courier, monospace;
            font-weight: bolder;
        }

        .random-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .random-row input {
            flex: 1;
            min-width: 4rem;
            max-width: 12rem;
        }

        @media (max-width: 500px) {
            .random-row button {
                padding-inline: 1rem;
                flex: 1;
            }
        }
    </style>
</head>

<body>
    <header>
        <a href="/" aria-label="Appübersicht" title="Appübersicht">&larr;</a>
        <h1>Zufallszahl</h1>
    </header>

    <main id="app">
        <form onsubmit="outputRandomNumber(); return false">
            <h2>Zahlenbereich</h2>
            <div class="random-row">
                <input type="number" placeholder="1" id="start" aria-label="Anfang" required>
                <span>bis</span>
                <input type="number" placeholder="100" id="end" aria-label="Ende" required>
                <button type="submit">Generieren</button>
            </div>
            <p class="output-line">Zufallszahl: <output for="start end" id="range-output"
                    class="random-output">-</output></p>
        </form>
        <section>
            <h2>Weiteres</h2>
            <div class="random-row">
                <button onclick="outputDiceRoll()">Würfeln</button>
                <button onclick="ouputCoinThrow()">Münze werfen</button>
            </div>
            <p class="output-line">Zahl: <output id="dice-output" class="random-output">-</output></p>
            <p class="output-line">Seite: <output id="coin-output" class="random-output">-</output></p>
        </section>
    </main>

    <footer>
        Copyright &copy; 2026 Felix Wrba. Alle Rechte vorbehalten.
    </footer>

    <script src="../lib.js"></script>
    <script>
        const startInput = $('#start');
        const endInput = $('#end');

        const rangeOutput = $('#range-output');
        const diceOutput = $('#dice-output');
        const coinOutput = $('#coin-output');

        function outputRandomNumber() {
            const start = parseInt(startInput.value);
            const end = parseInt(endInput.value);

            if (isNaN(start) || isNaN(end)) {
                rangeOutput.innerText = 'Ungültige Eingabe';
                return
            }

            rangeOutput.innerText = getNumberFromRange(start, end);
        }

        function outputDiceRoll() {
            diceOutput.innerText = getNumberFromRange(1, 6);
        }

        function ouputCoinThrow() {
            coinOutput.innerText = Math.random() > 0.5 ? 'Kopf' : 'Zahl';
        }
    </script>
</body>

</html>
